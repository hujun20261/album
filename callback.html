<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>百度网盘授权回调</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.95);
      color: #333;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 400px;
    }
    .icon { font-size: 48px; margin-bottom: 1rem; }
    .title { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
    .desc { color: #666; margin-bottom: 1.5rem; }
    .btn {
      background: #6366f1;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #5558e3; }
    .error { color: #ef4444; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="icon">⏳</div>
    <div class="title" id="title">正在处理授权...</div>
    <div class="desc" id="desc">请稍候</div>
    <button class="btn" id="closeBtn" style="display:none;" onclick="window.close()">关闭窗口</button>
  </div>

  <script type="module">
    import { parseTokenFromHash } from './baidu-sync.js';
    
    function showSuccess() {
      document.getElementById('icon').textContent = '✅';
      document.getElementById('title').textContent = '授权成功';
      document.getElementById('desc').textContent = '已成功绑定百度网盘，可以关闭此窗口返回相册';
      document.getElementById('closeBtn').style.display = 'inline-block';
    }
    
    function showError(msg) {
      document.getElementById('icon').textContent = '❌';
      document.getElementById('title').textContent = '授权失败';
      document.getElementById('desc').textContent = msg;
      document.getElementById('desc').classList.add('error');
    }
    
    // 解析 URL hash 中的 token
    const hash = window.location.hash;
    if (hash && hash.includes('access_token')) {
      try {
        const result = parseTokenFromHash(hash);
        if (result && result.token) {
          showSuccess();
          // 通知父窗口
          if (window.opener) {
            window.opener.postMessage({ type: 'baidu-auth-success' }, '*');
          }
        } else {
          showError('未能获取访问令牌');
        }
      } catch (e) {
        showError('解析令牌失败：' + e.message);
      }
    } else if (hash && hash.includes('error')) {
      // 处理错误情况
      const params = new URLSearchParams(hash.replace(/^#/, ''));
      const error = params.get('error');
      const errorDesc = params.get('error_description');
      showError(errorDesc || error || '授权被拒绝');
    } else {
      showError('无效的回调参数');
    }
  </script>
</body>
</html>
