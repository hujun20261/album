<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>私密相册 - 百度网盘授权</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .auth-container { max-width: 400px; margin: 40px auto; padding: 20px; }
    .auth-card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .auth-step { margin: 16px 0; padding: 16px; background: #f8f9fa; border-radius: 8px; }
    .auth-step-title { font-weight: 600; margin-bottom: 8px; }
    .auth-input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: monospace;
    }
    .auth-btn {
      background: #6366f1;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin-top: 12px;
      font-size: 16px;
    }
    .auth-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .status { margin-top: 16px; padding: 12px; border-radius: 6px; }
    .status.waiting { background: #fef3c7; color: #92400e; }
    .status.success { background: #d1fae5; color: #065f46; }
    .status.error { background: #fee2e2; color: #991b1b; }
    .help-text {
      color: #666;
      font-size: 13px;
      line-height: 1.6;
      margin: 12px 0;
    }
    .help-text ol { padding-left: 20px; }
    .help-text li { margin: 8px 0; }
  </style>
</head>
<body>
  <div class="app">
    <main class="main" style="margin-left:0;">
      <header class="topbar">
        <h1 class="topbar-title">百度网盘授权</h1>
      </header>
      <section class="content">
        <div class="auth-container">
          <div class="auth-card">
            <h2 style="margin-bottom:16px;">🔗 手动授权</h2>
            
            <div class="help-text">
              <p><strong>授权步骤：</strong></p>
              <ol>
                <li>点击下方按钮打开百度授权页面</li>
                <li>登录你的百度账号并授权</li>
                <li>授权成功后会跳转到回调页面</li>
                <li>复制回调页面显示的 Token</li>
                <li>粘贴到下方输入框，点击保存</li>
              </ol>
            </div>
            
            <button class="auth-btn" id="openAuthBtn">打开百度授权页面</button>
            
            <div class="auth-step" style="margin-top:24px;">
              <div class="auth-step-title">粘贴 Access Token</div>
              <input type="text" class="auth-input" id="tokenInput" placeholder="粘贴从回调页面复制的 Token">
              <button class="auth-btn" id="saveBtn">保存 Token</button>
            </div>
            
            <div class="status waiting" id="status" style="display:none;"></div>
            
            <button class="auth-btn" style="background:#6b7280;margin-top:16px;" id="backBtn">
              返回相册
            </button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const APP_KEY = 'AnykMXp2cFrjbv35enRfQEAXcTeYc5GM';
    const REDIRECT_URI = 'https://hujun20261.github.io/album/callback.html';
    
    const statusEl = document.getElementById('status');
    
    function showStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'status ' + type;
      statusEl.style.display = 'block';
    }
    
    // 打开授权页面
    document.getElementById('openAuthBtn').addEventListener('click', function() {
      const authUrl = `https://openapi.baidu.com/oauth/2.0/authorize?response_type=token&client_id=${APP_KEY}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=basic,netdisk&display=mobile`;
      window.open(authUrl, '_blank');
    });
    
    // 保存 Token
    document.getElementById('saveBtn').addEventListener('click', function() {
      const token = document.getElementById('tokenInput').value.trim();
      
      if (!token) {
        showStatus('❌ 请输入 Token', 'error');
        return;
      }
      
      // 保存到 localStorage
      localStorage.setItem('baidu-access-token', token);
      localStorage.setItem('baidu-token-expires', Date.now() + 30 * 24 * 60 * 60 * 1000); // 30天
      
      showStatus('✅ Token 已保存！授权成功', 'success');
      
      // 通知父窗口
      if (window.opener) {
        window.opener.postMessage({ type: 'baidu-auth-success' }, '*');
      }
    });
    
    // 返回按钮
    document.getElementById('backBtn').addEventListener('click', function() {
      window.location.href = 'simple.html';
    });
    
    // 检查是否从回调页面返回（URL 中有 token）
    const hash = window.location.hash;
    if (hash && hash.includes('access_token')) {
      const params = new URLSearchParams(hash.replace(/^#/, ''));
      const token = params.get('access_token');
      if (token) {
        document.getElementById('tokenInput').value = token;
        showStatus('✅ 检测到 Token，请点击保存', 'success');
      }
    }
  </script>
</body>
</html>
