<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>私密相册 - 百度网盘授权</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .auth-container { max-width: 420px; margin: 20px auto; padding: 16px; }
    .auth-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .step {
      display: flex;
      align-items: flex-start;
      margin: 16px 0;
      padding: 16px;
      background: #f8f9fa;
      border-radius: 10px;
    }
    .step-num {
      width: 28px;
      height: 28px;
      background: #6366f1;
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      flex-shrink: 0;
      margin-right: 12px;
    }
    .step-content { flex: 1; }
    .step-title { font-weight: 600; margin-bottom: 8px; font-size: 15px; }
    .step-desc { color: #666; font-size: 13px; line-height: 1.5; }
    .auth-btn {
      background: #6366f1;
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      width: 100%;
      margin-top: 8px;
    }
    .auth-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .token-input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: monospace;
      margin-top: 8px;
    }
    .status {
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .status.success { background: #d1fae5; color: #065f46; display: block; }
    .status.error { background: #fee2e2; color: #991b1b; display: block; }
    .back-btn {
      background: #6b7280;
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      width: 100%;
      margin-top: 16px;
    }
    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="main" style="margin-left:0;">
      <header class="topbar">
        <h1 class="topbar-title">百度网盘授权</h1>
      </header>
      <section class="content">
        <div class="auth-container">
          <div class="auth-card">
            
            <div class="step">
              <div class="step-num">1</div>
              <div class="step-content">
                <div class="step-title">打开百度授权</div>
                <div class="step-desc">点击下方按钮，登录百度账号并允许授权</div>
                <button class="auth-btn" id="openAuthBtn">打开百度授权页面</button>
              </div>
            </div>
            
            <div class="step">
              <div class="step-num">2</div>
              <div class="step-content">
                <div class="step-title">复制 Token</div>
                <div class="step-desc">授权成功后，在跳转的页面中长按复制 Token</div>
              </div>
            </div>
            
            <div class="step">
              <div class="step-num">3</div>
              <div class="step-content">
                <div class="step-title">粘贴保存</div>
                <div class="step-desc">将复制的 Token 粘贴到下方，点击保存</div>
                <input type="text" class="token-input" id="tokenInput" placeholder="粘贴 Token 到这里">
                <button class="auth-btn" id="saveBtn">保存 Token</button>
              </div>
            </div>
            
            <div class="status" id="status"></div>
            
            <div class="divider"></div>
            
            <button class="back-btn" id="backBtn">← 返回相册</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const APP_KEY = 'AnykMXp2cFrjbv35enRfQEAXcTeYc5GM';
    const REDIRECT_URI = 'https://hujun20261.github.io/album/callback.html';
    
    const statusEl = document.getElementById('status');
    
    function showStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'status ' + type;
    }
    
    // 打开授权页面
    document.getElementById('openAuthBtn').addEventListener('click', function() {
      const authUrl = `https://openapi.baidu.com/oauth/2.0/authorize?response_type=token&client_id=${APP_KEY}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=basic,netdisk&display=mobile`;
      window.open(authUrl, '_blank');
    });
    
    // 保存 Token
    document.getElementById('saveBtn').addEventListener('click', function() {
      const token = document.getElementById('tokenInput').value.trim();
      
      if (!token) {
        showStatus('❌ 请输入 Token', 'error');
        return;
      }
      
      // 保存到 localStorage
      localStorage.setItem('baidu-access-token', token);
      localStorage.setItem('baidu-token-expires', Date.now() + 30 * 24 * 60 * 60 * 1000);
      
      showStatus('✅ 授权成功！Token 已保存', 'success');
      
      // 通知父窗口
      if (window.opener) {
        window.opener.postMessage({ type: 'baidu-auth-success' }, '*');
      }
    });
    
    // 返回按钮
    document.getElementById('backBtn').addEventListener('click', function() {
      window.location.href = 'simple.html';
    });
    
    // 检查 URL hash 中是否有 token（从回调页面返回）
    const hash = window.location.hash;
    if (hash && hash.includes('access_token')) {
      const params = new URLSearchParams(hash.replace(/^#/, ''));
      const token = params.get('access_token');
      if (token) {
        document.getElementById('tokenInput').value = token;
        showStatus('✅ 已自动填入 Token，请点击保存', 'success');
      }
    }
  </script>
</body>
</html>
